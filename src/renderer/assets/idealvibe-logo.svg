<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!-- Light logo variant - for DARK backgrounds -->
<svg
   width="289.78"
   height="56.188"
   viewBox="0 0 289.78 56.188"
   fill="none"
   version="1.1"
   xmlns:xlink="http://www.w3.org/1999/xlink"
   xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="vibeGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient
       xlink:href="#vibeGradient"
       id="iconGradient"
       x1="-12" y1="-12" x2="12" y2="-12"
       gradientUnits="userSpaceOnUse"/>
    <linearGradient
       xlink:href="#vibeGradient"
       id="orbitGradient"
       x1="-36.5" y1="-13.5" x2="36.5" y2="-13.5"
       gradientUnits="userSpaceOnUse"/>
  </defs>

  <!-- Orbital Icon -->
  <g transform="translate(37.31,28.53)">
    <circle cx="0" cy="0" r="12" fill="url(#vibeGradient)"/>
    <ellipse cx="0" cy="0" rx="35" ry="12" stroke="url(#vibeGradient)" stroke-width="3" transform="rotate(-30)" fill="none" opacity="0.8"/>
    <circle cx="35" cy="0" r="5" fill="#06b6d4" transform="rotate(-30)"/>
    <ellipse cx="0" cy="0" rx="35" ry="12" stroke="url(#vibeGradient)" stroke-width="3" transform="rotate(30)" fill="none" opacity="0.8"/>
    <circle cx="-35" cy="0" r="5" fill="#7c3aed" transform="rotate(30)"/>
  </g>

  <!-- Text: IdealVibe -->
  <text
     x="77.31"
     y="39.53"
     font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
     font-weight="bold"
     font-size="48px"
     fill="#f8fafc">Ideal<tspan fill="url(#vibeGradient)">Vibe</tspan></text>

  <!-- Text: .online (right-aligned, white) -->
  <text
     x="288.14"
     y="53.69"
     font-family="Inter, sans-serif"
     font-weight="normal"
     font-size="16px"
     fill="#ffffff"
     text-anchor="end">.online</text>
</svg>
